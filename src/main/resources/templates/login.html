<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">

<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body{
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #d4fc79, #96e6a1);
        }

        .login-box{
            width: 400px;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        h1{
            text-align: center;
            color: #2e7d32;
            margin-bottom: 30px;
        }

        .input-group{
            margin-bottom: 20px;
        }

        .input-group label{
            display: block;
            margin-bottom: 8px;
            color: #388e3c;
            font-weight: bold;
        }

        .input-group input{
            width: 100%;
            padding: 12px;
            border: 2px solid #c8e6c9;
            border-radius: 12px;
            outline: none;
            font-size: 15px;
            transition: 0.3s;
        }

        .input-group input:focus{
            border-color: #66bb6a;
        }

        button{
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 12px;
            background: #66bb6a;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover{
            background: #43a047;
        }

        .register{
            text-align: center;
            margin-top: 20px;
            color: #555;
        }

        .register a{
            color: #2e7d32;
            font-weight: bold;
            text-decoration: none;
        }

        .register a:hover{
            text-decoration: underline;
        }

    </style>

</head>

<body>

<div class="login-box">

    <h1>Login</h1>

    <form th:action="@{/login}" method="post">

        <div class="input-group">
            <label>Username</label>

            <input type="text"
                   name="username"
                   placeholder="Masukkan username">
        </div>

        <div class="input-group">
            <label>Password</label>

            <input type="password"
                   name="password"
                   placeholder="Masukkan password">
        </div>

        <button type="submit">
            Login
        </button>

    </form>

    <div class="register">
        <p>Belum punya akun?</p>

        <a th:href="@{/register}">
            Register disini
        </a>
    </div>

</div>

</body>
</html>
