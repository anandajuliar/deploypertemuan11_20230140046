<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">

<head>
    <meta charset="UTF-8">
    <title>Register</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body{
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #d4fc79, #96e6a1);
        }

        .register-box{
            width: 420px;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        h1{
            text-align: center;
            color: #2e7d32;
            margin-bottom: 30px;
        }

        .input-group{
            margin-bottom: 18px;
        }

        .input-group input{
            width: 100%;
            padding: 14px;
            border: 2px solid #c8e6c9;
            border-radius: 12px;
            outline: none;
            font-size: 15px;
            transition: 0.3s;
        }

        .input-group input:focus{
            border-color: #66bb6a;
        }

        button{
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: #66bb6a;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        button:hover{
            background: #43a047;
        }

        .login-link{
            text-align: center;
            margin-top: 20px;
            color: #555;
        }

        .login-link a{
            color: #2e7d32;
            text-decoration: none;
            font-weight: bold;
        }

        .login-link a:hover{
            text-decoration: underline;
        }

    </style>

</head>

<body>

<div class="register-box">

    <h1>Register</h1>

    <form th:action="@{/register}" method="post" th:object="${request}">

        <div class="input-group">
            <input type="text"
                   th:field="*{username}"
                   placeholder="Username">
        </div>

        <div class="input-group">
            <input type="password"
                   th:field="*{password}"
                   placeholder="Password">
        </div>

        <div class="input-group">
            <input type="text"
                   th:field="*{nama}"
                   placeholder="Nama">
        </div>

        <div class="input-group">
            <input type="text"
                   th:field="*{alamat}"
                   placeholder="Alamat">
        </div>

        <button type="submit">
            Register
        </button>

    </form>

    <div class="login-link">
        <p>Sudah punya akun?</p>

        <a th:href="@{/login}">
            Login disini
        </a>
    </div>

</div>

</body>
</html>
