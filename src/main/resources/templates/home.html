<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Home</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background: linear-gradient(135deg, #d4fc79, #96e6a1);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container{
            background: white;
            width: 420px;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        h1{
            text-align: center;
            margin-bottom: 25px;
            color: #2e7d32;
        }

        .card{
            background: #f1fff3;
            padding: 18px;
            border-radius: 15px;
            margin-bottom: 15px;
            border-left: 6px solid #66bb6a;
        }

        .label{
            font-weight: bold;
            color: #388e3c;
            margin-bottom: 5px;
            display: block;
        }

        .value{
            color: #333;
            font-size: 16px;
        }

        .logout-btn{
            display: block;
            width: 100%;
            text-align: center;
            margin-top: 20px;
            padding: 12px;
            background: #66bb6a;
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: bold;
            transition: 0.3s;
        }

        .logout-btn:hover{
            background: #43a047;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>Home</h1>

    <div class="card">
        <span class="label">Username</span>
        <span class="value" th:text="${user.username}"></span>
    </div>

    <div class="card">
        <span class="label">Nama</span>
        <span class="value" th:text="${profile.nama}"></span>
    </div>

    <div class="card">
        <span class="label">Alamat</span>
        <span class="value" th:text="${profile.alamat}"></span>
    </div>

    <a th:href="@{/logout}" class="logout-btn">
        Logout
    </a>

</div>

</body>
</html>
